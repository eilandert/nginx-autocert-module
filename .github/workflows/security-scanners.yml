name: Security Scanners

# Standalone scanner workflow, adapted from nginx-error-abuse-module. It keeps
# slower/noisier source security tooling off the PR fast path while still
# publishing SARIF for Code Scanning.
#
# Action pins:
# actions/checkout@v5                  -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/cache@v4                     -> 0057852bfaa89a56745cba8c7296529d2fc39830
# actions/upload-artifact@v5           -> 330a01c490aca151604b8cf639adc76d48f6c5d4
# github/codeql-action/upload-sarif@v4 -> 8aad20d150bbac5944a9f9d289da16a4b0d87c1e

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Monthly, 1st @ 04:17 UTC.
    - cron: "17 4 1 * *"
  workflow_dispatch: {}

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secure:
    name: Secure
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-tidy \
            flawfinder \
            libpcre2-dev \
            libssl-dev \
            nginx-dev \
            pkg-config \
            python3 \
            python3-pip \
            python3-venv

      - name: Cache pip packages (semgrep)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-semgrep-${{ runner.os }}

      - name: Install semgrep
        run: |
          python3 -m venv "$RUNNER_TEMP/semgrep-venv"
          "$RUNNER_TEMP/semgrep-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/semgrep-venv/bin/pip" install --quiet semgrep
          echo "$RUNNER_TEMP/semgrep-venv/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/semgrep-venv/bin:$PATH"
          semgrep --version

      - name: Cache semgrep rules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.semgrep
          key: semgrep-rules-${{ runner.os }}-p-c-security-audit

      - name: Generate nginx build headers (for clang-tidy)
        run: |
          # /usr/share/nginx/src is root-owned; configure must create objs/ in it
          # (the clang-tidy step reads /usr/share/nginx/src/objs for the headers).
          sudo chown -R "$(id -u):$(id -g)" /usr/share/nginx/src
          cd /usr/share/nginx/src
          CC=gcc ./configure \
            --with-compat \
            --with-http_ssl_module \
            --add-dynamic-module="$GITHUB_WORKSPACE" >/tmp/nginx-dev-config.log 2>&1 \
            || { tail -60 /tmp/nginx-dev-config.log; exit 1; }

      - name: flawfinder (security risk scanner, SARIF)
        run: |
          flawfinder --minlevel=1 --sarif \
            "$GITHUB_WORKSPACE"/src/*.c > flawfinder.sarif 2>/dev/null || true
          flawfinder --minlevel=1 \
            "$GITHUB_WORKSPACE"/src/*.c 2>&1 | tee flawfinder.log
          if flawfinder --minlevel=4 --quiet \
               "$GITHUB_WORKSPACE"/src/*.c 2>/dev/null | grep -Eq 'Hits = [1-9]'; then
            echo "high-severity flawfinder findings present" >&2
            exit 1
          fi
          echo "flawfinder: scan complete"

      - name: Upload flawfinder SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: flawfinder.sarif
          category: flawfinder
        continue-on-error: true

      - name: clang-tidy (cert-*, bugprone-*, clang-analyzer-security.*)
        run: |
          NGINX_OBJS=/usr/share/nginx/src/objs
          NGINX_INCLUDES=$(dpkg -L nginx-dev 2>/dev/null \
            | grep 'ngx_config.h' | head -1 | xargs dirname || echo /usr/include/nginx)
          INCLUDES="-I$NGINX_INCLUDES -I$NGINX_OBJS -I$GITHUB_WORKSPACE/src -I/usr/include"
          : > clang-tidy.log
          for src in "$GITHUB_WORKSPACE"/src/*.c; do
            echo "--- clang-tidy: ${src##*/} ---" | tee -a clang-tidy.log
            # INCLUDES and pkg-config output are compiler flag lists that must split.
            # shellcheck disable=SC2086,SC2046
            clang-tidy "$src" \
              --checks='cert-*,clang-analyzer-security.*,clang-analyzer-unix.*,bugprone-*' \
              --warnings-as-errors='' \
              -- $INCLUDES $(pkg-config --cflags openssl 2>/dev/null) \
              2>&1 | tee -a clang-tidy.log || true
          done
          echo "clang-tidy: scan complete"

      - name: semgrep (C rule set)
        run: |
          semgrep scan \
            --config "p/c" \
            --config "p/security-audit" \
            --sarif --output semgrep.sarif \
            "$GITHUB_WORKSPACE/src" 2>&1 | tee semgrep.log
          echo "semgrep: scan complete"

      - name: Upload semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/flawfinder.sarif
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
            ${{ github.workspace }}/semgrep.sarif
          retention-days: 14
