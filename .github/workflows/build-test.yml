name: Build & Test

# Third-party actions pinned to commit SHAs for supply-chain safety.
# Pin table (canonical for all workflow files — keep consistent):
# actions/checkout@v4          -> 34e114876b0b11c390a56381ad16ebd13914f8d5
# actions/cache@v4             -> 0057852bfaa89a56745cba8c7296529d2fc39830
# actions/upload-artifact@v4   -> ea165f8d65b6e75b540449e92b4886f43607fa02
# actions/download-artifact@v4 -> d3f86a106a0bac45b974a628896c90dbdf5c8093
#
# Local composite actions:
#   ./.github/actions/setup         apt deps + optional ccache restore.
#   ./.github/actions/build-module  fetch+build one flavor, run the no-network
#                                   load/serve tests, upload build-<flavor>.

# Neither nginx nor angie is pinned: the `resolve` job scrapes the current
# mainline nginx and the latest angie release at run time. There are two
# independent build jobs (build-nginx, build-angie) so each is built exactly
# once and the downstream unit/e2e jobs depend on ONLY the flavor they consume
# (they download that flavor's artifact instead of recompiling). The Pebble
# issuance/renewal e2e runs on BOTH flavors: the nginx jobs gate on build-nginx
# (not blocked by a slow angie build), the e2e-angie matrix gates on build-angie.

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly Monday 04:17 UTC — catch nginx/angie API drift with no commits.
    - cron: "17 4 * * 1"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  resolve:
    name: Resolve nginx + angie versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      nginx_version: ${{ steps.v.outputs.nginx_version }}
      nginx_dir: ${{ steps.v.outputs.nginx_dir }}
      nginx_url: ${{ steps.v.outputs.nginx_url }}
      angie_version: ${{ steps.v.outputs.angie_version }}
      angie_dir: ${{ steps.v.outputs.angie_dir }}
      angie_url: ${{ steps.v.outputs.angie_url }}
    steps:
      - name: Resolve latest mainline nginx + latest angie
        id: v
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          if [ -z "$ver" ]; then
            echo "::error::could not resolve mainline nginx version"; exit 1
          fi
          angie=$(curl -fsSL https://download.angie.software/files/ \
            | grep -oP 'angie-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          if [ -z "$angie" ]; then
            echo "::error::could not resolve latest angie version"; exit 1
          fi
          echo "Resolved nginx mainline: $ver  angie: $angie"
          {
            echo "nginx_version=$ver"
            echo "nginx_dir=nginx-$ver"
            echo "nginx_url=https://nginx.org/download/nginx-$ver.tar.gz"
            echo "angie_version=$angie"
            echo "angie_dir=angie-$angie"
            echo "angie_url=https://download.angie.software/files/angie-$angie.tar.gz"
          } >> "$GITHUB_OUTPUT"

  build-nginx:
    name: Build & load (nginx ${{ needs.resolve.outputs.nginx_version }})
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build module + load/serve tests
        uses: ./.github/actions/build-module
        with:
          flavor: nginx
          version: ${{ needs.resolve.outputs.nginx_version }}
          url: ${{ needs.resolve.outputs.nginx_url }}
          dir: ${{ needs.resolve.outputs.nginx_dir }}

  build-angie:
    name: Build & load (angie ${{ needs.resolve.outputs.angie_version }})
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build module + load/serve tests
        uses: ./.github/actions/build-module
        with:
          flavor: angie
          version: ${{ needs.resolve.outputs.angie_version }}
          url: ${{ needs.resolve.outputs.angie_url }}
          dir: ${{ needs.resolve.outputs.angie_dir }}

  crypto-unit:
    name: Crypto unit tests (M3)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          packages: build-essential libssl-dev

      - name: Download nginx build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}

      - name: Build + run crypto unit tests
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          INC="-I$NGX/src/core -I$NGX/src/event -I$NGX/src/os/unix -I$NGX/objs"
          OBJS="$NGX/objs/src/core/ngx_palloc.o $NGX/objs/src/core/ngx_string.o \
                $NGX/objs/src/os/unix/ngx_time.o $NGX/objs/src/core/ngx_times.o \
                $NGX/objs/src/os/unix/ngx_alloc.o"
          gcc -Wall -Wextra -Werror $INC -o test_crypto \
            "$GITHUB_WORKSPACE/test/test_crypto.c" \
            "$GITHUB_WORKSPACE/src/ngx_http_autocert_crypto.c" \
            $OBJS -lssl -lcrypto
          ./test_crypto

  json-unit:
    name: JSON parser unit tests (M4c)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          packages: build-essential libssl-dev

      - name: Download nginx build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}

      - name: Build + run JSON unit tests
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          INC="-I$NGX/src/core -I$NGX/src/event -I$NGX/src/os/unix -I$NGX/objs"
          OBJS="$NGX/objs/src/core/ngx_palloc.o $NGX/objs/src/core/ngx_string.o \
                $NGX/objs/src/os/unix/ngx_time.o $NGX/objs/src/core/ngx_times.o \
                $NGX/objs/src/os/unix/ngx_alloc.o"
          gcc -Wall -Wextra -Werror $INC -o test_json \
            "$GITHUB_WORKSPACE/test/test_json.c" \
            "$GITHUB_WORKSPACE/src/ngx_autocert_json.c" \
            $OBJS
          ./test_json

  # ------------------------------------------------------------------ nginx e2e
  # The full Pebble issuance/renewal suite against the nginx build. Gates on
  # build-nginx only (a slow angie build never blocks these).

  acme-directory:
    name: ACME account register over TLS (M4b/M4c/M4d)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup runtime deps
        uses: ./.github/actions/setup
        with:
          packages: libpcre2-8-0
      - name: Download nginx build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}
      - name: Helper registers an ACME account over verified TLS
        run: |
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          chmod +x "$NGX/objs/nginx"
          SERVER_BIN="$NGX/objs/nginx" NGX_BUILD_DIR="$NGX" \
            bash "$GITHUB_WORKSPACE/tests/acme-directory.sh"

  order-authz:
    name: ACME order + authz reaches valid (M6a)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup runtime deps
        uses: ./.github/actions/setup
        with:
          packages: libpcre2-8-0
      - name: Download nginx build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}
      - name: Full order -> authz -> http-01 -> valid against Pebble
        run: |
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          chmod +x "$NGX/objs/nginx"
          sudo env SERVER_BIN="$NGX/objs/nginx" NGX_BUILD_DIR="$NGX" \
            bash "$GITHUB_WORKSPACE/tests/order-authz.sh"

  tls-alpn-issue:
    name: tls-alpn-01 full issuance, no port 80 (M10c)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup runtime deps
        uses: ./.github/actions/setup
        with:
          packages: libpcre2-8-0
      - name: Download nginx build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}
      - name: Full tls-alpn-01 issuance against Pebble (port 80 never used)
        run: |
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          chmod +x "$NGX/objs/nginx"
          SERVER_BIN="$NGX/objs/nginx" NGX_BUILD_DIR="$NGX" \
            bash "$GITHUB_WORKSPACE/tests/tls-alpn-issue.sh"

  renewal:
    name: ACME renewal + multi-name issuance (M8)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup runtime deps
        uses: ./.github/actions/setup
        with:
          packages: libpcre2-8-0
      - name: Download nginx build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}
      - name: Provision two domains, then force a renewal reissue
        run: |
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          chmod +x "$NGX/objs/nginx"
          sudo env SERVER_BIN="$NGX/objs/nginx" NGX_BUILD_DIR="$NGX" \
            bash "$GITHUB_WORKSPACE/tests/renewal.sh"

  backoff:
    name: Per-name failure backoff (M9b)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup runtime deps
        uses: ./.github/actions/setup
        with:
          packages: libpcre2-8-0
      - name: Download nginx build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}
      - name: A failing name must back off, a good name issues once
        run: |
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          chmod +x "$NGX/objs/nginx"
          sudo env SERVER_BIN="$NGX/objs/nginx" NGX_BUILD_DIR="$NGX" \
            bash "$GITHUB_WORKSPACE/tests/backoff.sh"

  retry-after:
    name: 429 / Retry-After rate-limit awareness (M9c)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup runtime deps
        uses: ./.github/actions/setup
        with:
          packages: libpcre2-8-0
      - name: Download nginx build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}
      - name: A 429 must honour Retry-After over the exponential backoff
        run: |
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          chmod +x "$NGX/objs/nginx"
          sudo env SERVER_BIN="$NGX/objs/nginx" NGX_BUILD_DIR="$NGX" \
            bash "$GITHUB_WORKSPACE/tests/retry-after.sh"

  # ------------------------------------------------------------------ angie e2e
  # The same Pebble issuance/renewal suite against the angie build (FLOW-2:
  # angie previously only got build+load+serve, never full issuance). One job,
  # matrixed over the test scripts; gates on build-angie only. Run uniformly
  # under sudo (the http-01/renewal/backoff/retry scripts bind :80; harmless for
  # the tls-alpn/account ones). The test scripts auto-detect objs/angie.

  e2e-angie:
    name: angie e2e (${{ matrix.test }})
    needs: [resolve, build-angie]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        test:
          - acme-directory
          - order-authz
          - tls-alpn-issue
          - renewal
          - backoff
          - retry-after
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup runtime deps
        uses: ./.github/actions/setup
        with:
          packages: libpcre2-8-0
      - name: Download angie build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-angie
          path: ${{ needs.resolve.outputs.angie_dir }}
      - name: ${{ matrix.test }} against Pebble on angie
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.angie_dir }}"
          chmod +x "$NGX/objs/angie"
          sudo env SERVER_BIN="$NGX/objs/angie" NGX_BUILD_DIR="$NGX" \
            bash "$GITHUB_WORKSPACE/tests/${{ matrix.test }}.sh"
