name: Build & Test

# Third-party actions pinned to commit SHAs for supply-chain safety.
# Pin table (canonical for all workflow files — keep consistent):
# actions/checkout@v5          -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/cache@v4             -> 0057852bfaa89a56745cba8c7296529d2fc39830
# actions/upload-artifact@v5   -> 330a01c490aca151604b8cf639adc76d48f6c5d4
# actions/download-artifact@v5 -> 634f93cb2916e3fdff6788551b99b062d0335ce0
#
# Local composite actions:
#   ./.github/actions/setup         apt deps + optional ccache restore.
#   ./.github/actions/build-module  fetch+build one flavor, run the no-network
#                                   load/serve tests, upload build-<flavor>.
#   ./.github/actions/run-e2e       restore build-nginx + run one tests/*.sh
#                                   Pebble e2e (optionally under sudo).

# Neither nginx nor angie is pinned: the `resolve` job scrapes the current
# mainline nginx and the latest angie release at run time.
#   - build-nginx fully builds nginx + the module, runs the no-network
#     load/serve tests, and uploads the tree; the unit + Pebble e2e jobs all
#     download build-nginx instead of recompiling.
#   - build-angie is COMPILE-ONLY: angie ships its own native `acme` directive,
#     so this module is not meant to run there. We only prove it still compiles
#     against angie's API (upstream-drift guard) and deliberately do not load it
#     or run the issuance suite, to stay out of angie's native ACME.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # Fast lint gate (adapted from nginx-error-abuse-module): static-check the C,
  # the shell test harness and the workflows before the build matrix spins up.
  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck shellcheck

      - name: Validate scripts and source
        run: |
          bash -n tests/*.sh fuzz/*.sh test/*.sh
          shellcheck tests/*.sh fuzz/*.sh test/*.sh
          # Tell cppcheck the OpenSSL version so it takes the satisfied branch
          # of the >= 3.0.0 floor guard instead of evaluating the intentional
          # `#error` with the macro undefined (cppcheck doesn't parse the system
          # opensslv.h). The real build enforces the same floor at compile time.
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            -DOPENSSL_VERSION_NUMBER=0x30000000L \
            --suppress=missingIncludeSystem \
            --suppress=normalCheckLevelMaxBranches \
            --suppress=unusedFunction \
            src/*.c
          git diff --check

      - name: Lint workflows
        run: |
          version=1.7.7
          base="https://github.com/rhysd/actionlint/releases/download/v${version}"
          tarball="actionlint_${version}_linux_amd64.tar.gz"
          # Verify the asset against the checksums published in the same release
          # before executing it, so a tampered download fails closed.
          curl -fsSL -o /tmp/actionlint.tgz "${base}/${tarball}"
          curl -fsSL -o /tmp/actionlint.checksums \
            "${base}/actionlint_${version}_checksums.txt"
          ( cd /tmp && grep " ${tarball}\$" actionlint.checksums \
              | sed 's#'"${tarball}"'#actionlint.tgz#' | sha256sum -c - )
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          /tmp/actionlint -color .github/workflows/*.yml

  resolve:
    name: Resolve nginx + angie versions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      nginx_version: ${{ steps.v.outputs.nginx_version }}
      nginx_dir: ${{ steps.v.outputs.nginx_dir }}
      nginx_url: ${{ steps.v.outputs.nginx_url }}
      angie_version: ${{ steps.v.outputs.angie_version }}
      angie_dir: ${{ steps.v.outputs.angie_dir }}
      angie_url: ${{ steps.v.outputs.angie_url }}
    steps:
      - name: Resolve latest mainline nginx + latest angie
        id: v
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          if [ -z "$ver" ]; then
            echo "::error::could not resolve mainline nginx version"; exit 1
          fi
          angie=$(curl -fsSL https://download.angie.software/files/ \
            | grep -oP 'angie-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          if [ -z "$angie" ]; then
            echo "::error::could not resolve latest angie version"; exit 1
          fi
          echo "Resolved nginx mainline: $ver  angie: $angie"
          {
            echo "nginx_version=$ver"
            echo "nginx_dir=nginx-$ver"
            echo "nginx_url=https://nginx.org/download/nginx-$ver.tar.gz"
            echo "angie_version=$angie"
            echo "angie_dir=angie-$angie"
            echo "angie_url=https://download.angie.software/files/angie-$angie.tar.gz"
          } >> "$GITHUB_OUTPUT"

  build-nginx:
    name: Build & load (nginx ${{ needs.resolve.outputs.nginx_version }})
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Build module + load/serve tests
        uses: ./.github/actions/build-module
        with:
          flavor: nginx
          version: ${{ needs.resolve.outputs.nginx_version }}
          url: ${{ needs.resolve.outputs.nginx_url }}
          dir: ${{ needs.resolve.outputs.nginx_dir }}

  # angie ships its own native `acme` directive, so this module is not intended
  # to run on the angie stack — we only assert it still COMPILES against angie's
  # API (catch upstream drift), and deliberately do NOT load it or run the
  # issuance suite, to stay out of the way of angie's native ACME.
  build-angie:
    name: Compile-only (angie ${{ needs.resolve.outputs.angie_version }})
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          ccache-key: build-angie-${{ needs.resolve.outputs.angie_version }}

      - name: Restore angie tarball cache
        id: angie-tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/src-tarballs
          key: src-tarball-angie-${{ needs.resolve.outputs.angie_version }}

      - name: Fetch angie ${{ needs.resolve.outputs.angie_version }}
        if: steps.angie-tarball.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/src-tarballs
          curl -fsSL \
            -o ~/.cache/src-tarballs/angie-${{ needs.resolve.outputs.angie_version }}.tar.gz \
            "${{ needs.resolve.outputs.angie_url }}"

      - name: Extract angie ${{ needs.resolve.outputs.angie_version }}
        run: |
          set -euo pipefail
          tar -xzf ~/.cache/src-tarballs/angie-${{ needs.resolve.outputs.angie_version }}.tar.gz

      - name: Configure + compile module against angie
        run: |
          set -euo pipefail
          cd "${{ needs.resolve.outputs.angie_dir }}"
          ./configure --with-compat --with-http_ssl_module \
            --with-cc="ccache cc" \
            --with-cc-opt="-Wall -Wextra -Werror" \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /tmp/conf.log 2>&1 \
            || { tail -40 /tmp/conf.log; exit 1; }
          # `make modules`: we only need the .so to compile+link, not a server.
          make modules > /tmp/make.log 2>&1 || { tail -40 /tmp/make.log; exit 1; }
          test -f objs/ngx_http_autocert_module.so
          test -f objs/ngx_autocert_process_module.so
          ccache -s || true
          echo "✓ autocert modules compile against angie ${{ needs.resolve.outputs.angie_version }}"

  # Prove a PRODUCTION build (no AUTOCERT_TEST) omits the test-only seed
  # directives entirely, so a stray/templated autocert_test_challenge cannot
  # inject a forged key authorization. Builds the module withOUT the flag and
  # asserts `nginx -t` rejects the directive as unknown.
  test-directives-guard:
    name: Test-only directives rejected in prod build
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          ccache-key: build-nginx-${{ needs.resolve.outputs.nginx_version }}

      - name: Restore nginx tarball cache
        id: nginx-tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/src-tarballs
          key: src-tarball-nginx-${{ needs.resolve.outputs.nginx_version }}

      - name: Fetch nginx ${{ needs.resolve.outputs.nginx_version }}
        if: steps.nginx-tarball.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/src-tarballs
          curl -fsSL \
            -o ~/.cache/src-tarballs/nginx-${{ needs.resolve.outputs.nginx_version }}.tar.gz \
            "${{ needs.resolve.outputs.nginx_url }}"

      - name: Extract nginx ${{ needs.resolve.outputs.nginx_version }}
        run: |
          set -euo pipefail
          tar -xzf ~/.cache/src-tarballs/nginx-${{ needs.resolve.outputs.nginx_version }}.tar.gz

      - name: Build prod (no AUTOCERT_TEST) + assert directive rejected
        run: |
          set -euo pipefail
          cd "${{ needs.resolve.outputs.nginx_dir }}"
          # No AUTOCERT_TEST in the env: the test-only directives must be absent.
          ./configure --with-compat --with-http_ssl_module \
            --with-cc="ccache cc" \
            --with-cc-opt="-Wall -Wextra -Werror" \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /tmp/conf.log 2>&1 \
            || { tail -40 /tmp/conf.log; exit 1; }
          # Full build: `nginx -t` below needs the server binary, not just the .so.
          make > /tmp/make.log 2>&1 || { tail -40 /tmp/make.log; exit 1; }
          test -f objs/ngx_http_autocert_module.so
          test -f objs/ngx_autocert_process_module.so
          BIN=objs/nginx
          test -x "$BIN"
          PREFIX=/tmp/guard; mkdir -p "$PREFIX/conf" "$PREFIX/logs"
          for dir in autocert_test_challenge autocert_test_alpn; do
            cat > "$PREFIX/conf/nginx.conf" <<EOF
          load_module $PWD/objs/ngx_autocert_process_module.so;
          load_module $PWD/objs/ngx_http_autocert_module.so;
          events {}
          http { $dir a b; server { listen 8099; autocert on; } }
          EOF
            out="$("$BIN" -t -p "$PREFIX" -c "$PREFIX/conf/nginx.conf" 2>&1 || true)"
            if printf '%s\n' "$out" | grep -q "unknown directive \"$dir\""; then
              echo "✓ prod build rejects $dir"
            else
              echo "::error::$dir was NOT rejected by a no-flag prod build"
              printf '%s\n' "$out" | sed 's/^/    /'
              exit 1
            fi
          done
          ccache -s || true

  crypto-unit:
    name: Crypto unit tests (M3)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          packages: build-essential libssl-dev

      - name: Download nginx build
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}

      - name: Build + run crypto unit tests
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          INC="-I$NGX/src/core -I$NGX/src/event -I$NGX/src/os/unix -I$NGX/objs"
          OBJS="$NGX/objs/src/core/ngx_palloc.o $NGX/objs/src/core/ngx_string.o \
                $NGX/objs/src/os/unix/ngx_time.o $NGX/objs/src/core/ngx_times.o \
                $NGX/objs/src/os/unix/ngx_alloc.o"
          # INC and OBJS are flag/object lists that must word-split.
          # shellcheck disable=SC2086
          gcc -Wall -Wextra -Werror $INC -o test_crypto \
            "$GITHUB_WORKSPACE/test/test_crypto.c" \
            "$GITHUB_WORKSPACE/src/ngx_http_autocert_crypto.c" \
            $OBJS -lssl -lcrypto
          ./test_crypto

  json-unit:
    name: JSON parser unit tests (M4c)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          packages: build-essential libssl-dev

      - name: Download nginx build
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}

      - name: Build + run JSON unit tests
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          INC="-I$NGX/src/core -I$NGX/src/event -I$NGX/src/os/unix -I$NGX/objs"
          OBJS="$NGX/objs/src/core/ngx_palloc.o $NGX/objs/src/core/ngx_string.o \
                $NGX/objs/src/os/unix/ngx_time.o $NGX/objs/src/core/ngx_times.o \
                $NGX/objs/src/os/unix/ngx_alloc.o"
          # INC and OBJS are flag/object lists that must word-split.
          # shellcheck disable=SC2086
          gcc -Wall -Wextra -Werror $INC -o test_json \
            "$GITHUB_WORKSPACE/test/test_json.c" \
            "$GITHUB_WORKSPACE/src/ngx_autocert_json.c" \
            $OBJS
          ./test_json

  http-unit:
    name: HTTP parser unit tests (M4b)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          packages: build-essential

      - name: Build + run HTTP parser unit tests
        run: |
          set -euo pipefail
          # Self-contained: the parser bodies are sliced from the shipped
          # ngx_autocert_acme.c by extract_http.sh and compiled against the
          # fuzz shim — no nginx objects needed (the rest of that TU is
          # event/SSL/resolver machinery the parser does not touch).
          bash fuzz/extract_http.sh
          gcc -Wall -Wextra -Werror -I"$GITHUB_WORKSPACE" \
            -o test_http "$GITHUB_WORKSPACE/test/test_http.c"
          ./test_http

  challenge-unit:
    name: Challenge store unit tests (M5)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          packages: build-essential

      - name: Download nginx build
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}

      - name: Build + run challenge store unit tests
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          INC="-I$NGX/src/core -I$NGX/src/event -I$NGX/src/os/unix -I$NGX/objs"
          # slab/rbtree/crc32/shmtx on top of the base pool/string/time objs.
          OBJS="$NGX/objs/src/core/ngx_palloc.o $NGX/objs/src/core/ngx_string.o \
                $NGX/objs/src/os/unix/ngx_time.o $NGX/objs/src/core/ngx_times.o \
                $NGX/objs/src/os/unix/ngx_alloc.o $NGX/objs/src/core/ngx_slab.o \
                $NGX/objs/src/core/ngx_rbtree.o $NGX/objs/src/core/ngx_crc32.o \
                $NGX/objs/src/core/ngx_shmtx.o"
          # The store source carries an (intentional) unused init-zone `data`
          # param, so compile it with nginx's own -Wall (no -Wextra), and keep
          # -Wextra -Werror on the test TU.
          # shellcheck disable=SC2086
          gcc -Wall -Werror $INC -c \
            "$GITHUB_WORKSPACE/src/ngx_autocert_challenge.c" -o challenge.o
          # shellcheck disable=SC2086
          gcc -Wall -Wextra -Werror $INC -c \
            "$GITHUB_WORKSPACE/test/test_challenge.c" -o test_challenge_tu.o
          # shellcheck disable=SC2086
          gcc -o test_challenge test_challenge_tu.o challenge.o $OBJS
          ./test_challenge

  alpn-unit:
    name: ALPN store unit tests (M10b)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          packages: build-essential

      - name: Download nginx build
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}

      - name: Build + run ALPN store unit tests
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          INC="-I$NGX/src/core -I$NGX/src/event -I$NGX/src/os/unix -I$NGX/objs"
          OBJS="$NGX/objs/src/core/ngx_palloc.o $NGX/objs/src/core/ngx_string.o \
                $NGX/objs/src/os/unix/ngx_time.o $NGX/objs/src/core/ngx_times.o \
                $NGX/objs/src/os/unix/ngx_alloc.o $NGX/objs/src/core/ngx_slab.o \
                $NGX/objs/src/core/ngx_rbtree.o $NGX/objs/src/core/ngx_crc32.o \
                $NGX/objs/src/core/ngx_shmtx.o"
          # shellcheck disable=SC2086
          gcc -Wall -Werror $INC -c \
            "$GITHUB_WORKSPACE/src/ngx_autocert_alpn.c" -o alpn.o
          # shellcheck disable=SC2086
          gcc -Wall -Wextra -Werror $INC -c \
            "$GITHUB_WORKSPACE/test/test_alpn.c" -o test_alpn_tu.o
          # shellcheck disable=SC2086
          gcc -o test_alpn test_alpn_tu.o alpn.o $OBJS
          ./test_alpn

  cert-time-unit:
    name: Cert-expiry unit tests (M8)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          packages: build-essential libssl-dev

      - name: Download nginx build
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}

      - name: Build + run cert-expiry unit tests
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          INC="-I$NGX/src/core -I$NGX/src/event -I$NGX/src/os/unix -I$NGX/objs"
          OBJS="$NGX/objs/src/core/ngx_palloc.o $NGX/objs/src/core/ngx_string.o \
                $NGX/objs/src/os/unix/ngx_time.o $NGX/objs/src/core/ngx_times.o \
                $NGX/objs/src/os/unix/ngx_alloc.o"
          # _GNU_SOURCE: the test cross-checks ngx_autocert_timegm against libc
          # timegm(3). The test include-shims the crypto .c to reach the static
          # ngx_autocert_timegm, so run it from the repo root (relative fixture
          # path test/fixture_leaf.pem).
          # shellcheck disable=SC2086
          gcc -D_GNU_SOURCE -Wall -Wextra -Werror $INC -o test_cert_time \
            "$GITHUB_WORKSPACE/test/test_cert_time.c" \
            $OBJS -lssl -lcrypto
          ./test_cert_time

  account-jsonsafe-unit:
    name: Account json_safe unit tests (M4d)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          packages: build-essential

      - name: Download nginx build
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: build-nginx
          path: ${{ needs.resolve.outputs.nginx_dir }}

      - name: Build + run account json_safe unit tests
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/${{ needs.resolve.outputs.nginx_dir }}"
          INC="-I$NGX/src/core -I$NGX/src/event -I$NGX/src/os/unix -I$NGX/objs"
          # Slice just ngx_autocert_account_json_safe from the shipped account
          # source — the function depends only on ngx_str_t, so no nginx objects
          # are linked.
          bash test/extract_jsonsafe.sh
          # shellcheck disable=SC2086
          gcc -Wall -Wextra -Werror -Itest $INC -o test_account_jsonsafe \
            "$GITHUB_WORKSPACE/test/test_account_jsonsafe.c"
          ./test_account_jsonsafe

  # ------------------------------------------------------------------ nginx e2e
  # The full Pebble issuance/renewal suite against the nginx build. Gates on
  # build-nginx only (a slow angie build never blocks these).

  acme-directory:
    name: ACME account register over TLS (M4b/M4c/M4d)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Helper registers an ACME account over verified TLS
        uses: ./.github/actions/run-e2e
        with:
          nginx-dir: ${{ needs.resolve.outputs.nginx_dir }}
          script: acme-directory.sh

  order-authz:
    name: ACME order + authz reaches valid (M6a)
    needs: [resolve, build-nginx]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
