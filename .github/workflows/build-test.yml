name: Build & Test

# Third-party actions pinned to commit SHAs for supply-chain safety.
# Pin table (canonical for all workflow files — keep consistent):
# actions/checkout@v4        -> 34e114876b0b11c390a56381ad16ebd13914f8d5
# actions/cache@v4           -> 0057852bfaa89a56745cba8c7296529d2fc39830
# actions/upload-artifact@v4 -> ea165f8d65b6e75b540449e92b4886f43607fa02

# nginx version is NOT pinned: the `resolve` job scrapes nginx.org for the
# current mainline + stable at run time and feeds them to the build matrix,
# alongside the pinned Angie fork. The module must build and LOAD on all three.

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]
  schedule:
    # Weekly Monday 04:17 UTC — catch nginx/angie API drift with no commits.
    - cron: "17 4 * * 1"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  resolve:
    name: Resolve nginx version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.v.outputs.matrix }}
    steps:
      - name: Resolve latest mainline + stable nginx
        id: v
        run: |
          set -euo pipefail
          vers=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V)
          ver=$(echo "$vers" | tail -1)
          if [ -z "$ver" ]; then
            echo "::error::could not resolve mainline nginx version"
            exit 1
          fi
          stable=$(echo "$vers" | awk -F. '($2 % 2)==0' | sort -V | tail -1)
          [ -z "$stable" ] && stable="$ver"
          echo "Resolved nginx mainline: $ver  stable: $stable"
          # Angie fork pinned; bump alongside nginx as releases ship.
          matrix=$(printf 'matrix={"include":[{"flavor":"nginx","version":"%s","url":"https://nginx.org/download/nginx-%s.tar.gz","dir":"nginx-%s"},{"flavor":"nginx","version":"%s","url":"https://nginx.org/download/nginx-%s.tar.gz","dir":"nginx-%s"},{"flavor":"angie","version":"1.11.5","url":"https://download.angie.software/files/angie-1.11.5.tar.gz","dir":"angie-1.11.5"}]}' \
            "$ver" "$ver" "$ver" "$stable" "$stable" "$stable")
          { echo "$matrix"; } >> "$GITHUB_OUTPUT"

  build:
    name: Build & load (${{ matrix.flavor }} ${{ matrix.version }})
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.matrix) }}
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre2-dev zlib1g-dev libssl-dev

      - name: Fetch ${{ matrix.flavor }} ${{ matrix.version }}
        run: |
          set -euo pipefail
          curl -fsSL -o src.tar.gz "${{ matrix.url }}"
          tar -xzf src.tar.gz

      - name: Configure + build module
        run: |
          set -euo pipefail
          cd "${{ matrix.dir }}"
          ./configure --with-compat --with-http_ssl_module \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /tmp/conf.log 2>&1 \
            || { tail -40 /tmp/conf.log; exit 1; }
          # Full build (not `make modules`): the load test needs the server
          # binary too. angie names it objs/angie, nginx names it objs/nginx.
          make > /tmp/make.log 2>&1 || { tail -40 /tmp/make.log; exit 1; }
          test -f objs/ngx_http_autocert_module.so
          test -f objs/ngx_autocert_process_module.so   # CORE module (M4a helper)
          BIN=objs/nginx; [ -x objs/angie ] && BIN=objs/angie
          test -x "$BIN"
          echo "SERVER_BIN=$PWD/$BIN" >> "$GITHUB_ENV"
          echo "✓ built autocert .so (http + process) + $BIN"

      - name: Load smoke test (parse + name collection)
        run: |
          set -euo pipefail
          cd "${{ matrix.dir }}"
          BIN="$SERVER_BIN"
          MOD="$PWD/objs/ngx_http_autocert_module.so"
          PROC="$PWD/objs/ngx_autocert_process_module.so"
          PREFIX=/tmp/ngx-test
          mkdir -p "$PREFIX/logs" "$PREFIX/conf"
          cat > "$PREFIX/conf/nginx.conf" <<EOF
          load_module $PROC;
          load_module $MOD;
          events {}
          http {
              autocert on admin@example.com;   # global
              # M2 global tuning knobs (all non-default values).
              autocert_ca https://acme-staging-v02.api.letsencrypt.org/directory;
              autocert_renew_before 10d;
              autocert_key_type secp256r1;
              autocert_store certbot;
              autocert_path /var/lib/autocert;
              autocert_challenge tls-alpn-01;
              server {
                  listen 8080;
                  server_name a.example.com www.a.example.com;
                  autocert on;                  # per-vhost override, 2 names
              }
              server {
                  listen 8081;
                  server_name b.example.com;
                  autocert off;                 # opt out, name NOT collected
              }
              server {
                  listen 8082;
                  # regex + leading/suffix wildcard names are skipped (not issuable).
                  server_name ~^re\.example\.com$ *.wild.example.com www.suffix.*;
                  autocert on;
              }
          }
          EOF
          # 1) -t: config parses, module loads, postconfig walk runs clean.
          "$BIN" -t -p "$PREFIX" -c "$PREFIX/conf/nginx.conf"
          # 2) The postconfig name-count NOTICE is only emitted on a real start
          #    (nginx gates notice-level output under -t), so briefly start,
          #    grep the error log, then stop. High ports → no root needed.
          "$BIN" -p "$PREFIX" -c "$PREFIX/conf/nginx.conf"
          for i in $(seq 1 20); do [ -s "$PREFIX/logs/error.log" ] && break; sleep 0.2; done
          "$BIN" -p "$PREFIX" -c "$PREFIX/conf/nginx.conf" -s stop || true
          cat "$PREFIX/logs/error.log"
          # Exactly the 2 concrete names of the enabled vhost must be collected:
          # b.* is off; regex + wildcard are skipped; dedup across vhosts.
          grep -q 'autocert: 2 name(s) enabled for issuance' "$PREFIX/logs/error.log"
          echo "✓ ${{ matrix.flavor }} ${{ matrix.version }} parsed autocert_* + collected enabled names"

      - name: Reject invalid config (negative tests)
        run: |
          set -euo pipefail
          cd "${{ matrix.dir }}"
          BIN="$SERVER_BIN"
          MOD="$PWD/objs/ngx_http_autocert_module.so"
          PREFIX=/tmp/ngx-bad
          mkdir -p "$PREFIX/logs" "$PREFIX/conf"

          # Each case: a description, the http{} body, and the substring the
          # rejection message must contain. Every one must fail `nginx -t`.
          run_neg() {
            local desc="$1" body="$2" want="$3"
            printf 'load_module %s;\nevents {}\nhttp {\n%s\n}\n' \
              "$MOD" "$body" > "$PREFIX/conf/nginx.conf"
            if "$BIN" -t -p "$PREFIX" -c "$PREFIX/conf/nginx.conf" 2>/tmp/err; then
              echo "::error::[$desc] invalid config was accepted"; cat /tmp/err
              exit 1
            fi
            if ! grep -q "$want" /tmp/err; then
              echo "::error::[$desc] wrong error message (wanted: $want)"
              cat /tmp/err; exit 1
            fi
            echo "✓ rejected: $desc"
          }

          run_neg "invalid email"     'server { listen 8080; autocert on x@; }'                          'invalid email'
          run_neg "bad key_type"      'autocert_key_type rsa2048;'                                       'invalid key type'
          run_neg "bad store"         'autocert_store vault;'                                            'invalid store'
          run_neg "bad challenge"     'autocert_challenge dns-01;'                                       'invalid challenge'
          run_neg "duplicate key"     'autocert_key_type secp384r1; autocert_key_type secp256r1;'        'is duplicate'
          run_neg "knob in server{}"  'server { listen 8080; autocert_ca http://x/; }'                   'directive is not allowed'
          echo "✓ all negative cases rejected"

      - name: Helper process lifecycle (M4a)
        run: |
          set -euo pipefail
          # Channel-managed ACME helper: start spawns one, reload x2 keeps exactly
          # one (old retired, new respawned), crash auto-respawns, stop tears down
          # cleanly with no SIGKILL/hang. Runs against this matrix flavor's build
          # (nginx mainline+stable AND angie), reusing the dir from the build step.
          NGX_BUILD_DIR="$GITHUB_WORKSPACE/${{ matrix.dir }}" \
            AC_TEST_PORT=18177 \
            bash "$GITHUB_WORKSPACE/tests/helper-lifecycle.sh"

      - name: HTTP-01 challenge serve (M5)
        run: |
          set -euo pipefail
          # Seed a token via autocert_test_challenge, fetch
          # /.well-known/acme-challenge/<token>, assert exact keyauth + 404s.
          # No network/docker — pure nginx/angie. Reuses the matrix build dir.
          SERVER_BIN="$GITHUB_WORKSPACE/${{ matrix.dir }}/$( \
            [ -x "${{ matrix.dir }}/objs/angie" ] && echo objs/angie || echo objs/nginx)" \
            NGX_BUILD_DIR="$GITHUB_WORKSPACE/${{ matrix.dir }}" \
            AC_TEST_PORT=18178 \
            bash "$GITHUB_WORKSPACE/tests/http01-challenge.sh"

      - name: Per-SNI certificate serving (M7)
        run: |
          set -euo pipefail
          # `listen ssl; autocert on;` with no ssl_certificate must start,
          # serve a bootstrap cert pre-issuance, serve the real store cert by
          # SNI, and hot-reload on mtime change. No network/docker.
          SERVER_BIN="$GITHUB_WORKSPACE/${{ matrix.dir }}/$( \
            [ -x "${{ matrix.dir }}/objs/angie" ] && echo objs/angie || echo objs/nginx)" \
            NGX_BUILD_DIR="$GITHUB_WORKSPACE/${{ matrix.dir }}" \
            AC_TEST_PORT=18179 \
            bash "$GITHUB_WORKSPACE/tests/tls-serve.sh"

  crypto-unit:
    name: Crypto unit tests (M3)
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre2-dev zlib1g-dev libssl-dev

      - name: Fetch + configure nginx (for ngx_palloc/string/times objects)
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          curl -fsSL -o src.tar.gz "https://nginx.org/download/nginx-$ver.tar.gz"
          tar -xzf src.tar.gz
          echo "NGX=$PWD/nginx-$ver" >> "$GITHUB_ENV"
          # configure + a full build so the core .o files we link exist.
          ( cd "nginx-$ver" \
            && ./configure --with-compat --with-http_ssl_module > /tmp/c.log 2>&1 \
            && make > /tmp/m.log 2>&1 ) || { tail -40 /tmp/c.log /tmp/m.log; exit 1; }

      - name: Build + run crypto unit tests
        run: |
          set -euo pipefail
          INC="-I$NGX/src/core -I$NGX/src/event -I$NGX/src/os/unix -I$NGX/objs"
          OBJS="$NGX/objs/src/core/ngx_palloc.o $NGX/objs/src/core/ngx_string.o \
                $NGX/objs/src/os/unix/ngx_time.o $NGX/objs/src/core/ngx_times.o \
                $NGX/objs/src/os/unix/ngx_alloc.o"
          gcc -Wall -Wextra -Werror $INC -o test_crypto \
            "$GITHUB_WORKSPACE/test/test_crypto.c" \
            "$GITHUB_WORKSPACE/src/ngx_http_autocert_crypto.c" \
            $OBJS -lssl -lcrypto
          ./test_crypto

  json-unit:
    name: JSON parser unit tests (M4c)
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre2-dev zlib1g-dev libssl-dev

      - name: Fetch + configure nginx (for ngx_palloc/string/times objects)
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          curl -fsSL -o src.tar.gz "https://nginx.org/download/nginx-$ver.tar.gz"
          tar -xzf src.tar.gz
          echo "NGX=$PWD/nginx-$ver" >> "$GITHUB_ENV"
          ( cd "nginx-$ver" \
            && ./configure --with-compat --with-http_ssl_module > /tmp/c.log 2>&1 \
            && make > /tmp/m.log 2>&1 ) || { tail -40 /tmp/c.log /tmp/m.log; exit 1; }

      - name: Build + run JSON unit tests
        run: |
          set -euo pipefail
          INC="-I$NGX/src/core -I$NGX/src/event -I$NGX/src/os/unix -I$NGX/objs"
          OBJS="$NGX/objs/src/core/ngx_palloc.o $NGX/objs/src/core/ngx_string.o \
                $NGX/objs/src/os/unix/ngx_time.o $NGX/objs/src/core/ngx_times.o \
                $NGX/objs/src/os/unix/ngx_alloc.o"
          gcc -Wall -Wextra -Werror $INC -o test_json \
            "$GITHUB_WORKSPACE/test/test_json.c" \
            "$GITHUB_WORKSPACE/src/ngx_autocert_json.c" \
            $OBJS
          ./test_json

  acme-directory:
    name: ACME account register over TLS (M4b/M4c/M4d)
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre2-dev zlib1g-dev libssl-dev

      - name: Fetch + build nginx with the module
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          curl -fsSL -o src.tar.gz "https://nginx.org/download/nginx-$ver.tar.gz"
          tar -xzf src.tar.gz
          cd "nginx-$ver"
          ./configure --with-compat --with-http_ssl_module \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /tmp/conf.log 2>&1 \
            || { tail -40 /tmp/conf.log; exit 1; }
          make > /tmp/make.log 2>&1 || { tail -40 /tmp/make.log; exit 1; }
          echo "SERVER_BIN=$PWD/objs/nginx" >> "$GITHUB_ENV"

      - name: Helper registers an ACME account over verified TLS
        run: |
          # Pebble + dnsmasq run as docker containers (available on GH runners).
          # The script wires them up, points the helper at Pebble with Pebble's
          # CA in the trust store, and asserts a 200 directory fetch.
          bash "$GITHUB_WORKSPACE/tests/acme-directory.sh"

  order-authz:
    name: ACME order + authz reaches valid (M6a)
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre2-dev zlib1g-dev libssl-dev

      - name: Fetch + build nginx with the module
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          curl -fsSL -o src.tar.gz "https://nginx.org/download/nginx-$ver.tar.gz"
          tar -xzf src.tar.gz
          cd "nginx-$ver"
          ./configure --with-compat --with-http_ssl_module \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /tmp/conf.log 2>&1 \
            || { tail -40 /tmp/conf.log; exit 1; }
          make > /tmp/make.log 2>&1 || { tail -40 /tmp/make.log; exit 1; }
          echo "SERVER_BIN=$PWD/objs/nginx" >> "$GITHUB_ENV"

      - name: Full order -> authz -> http-01 -> valid against Pebble
        run: |
          # The helper registers an account, then drives newOrder -> fetch authz
          # -> publish the http-01 keyauth to the challenge store -> POST the
          # challenge -> poll until the authorization is "valid". Pebble's VA
          # fetches the token from our :80 worker handler, so nginx binds :80
          # (root) and dnsmasq points the order domain at the host.
          sudo env SERVER_BIN="$SERVER_BIN" \
            NGX_BUILD_DIR="$(dirname "$SERVER_BIN")/.." \
            bash "$GITHUB_WORKSPACE/tests/order-authz.sh"

  renewal:
    name: ACME renewal + multi-name issuance (M8)
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre2-dev zlib1g-dev libssl-dev

      - name: Fetch + build nginx with the module
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          curl -fsSL -o src.tar.gz "https://nginx.org/download/nginx-$ver.tar.gz"
          tar -xzf src.tar.gz
          cd "nginx-$ver"
          ./configure --with-compat --with-http_ssl_module \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /tmp/conf.log 2>&1 \
            || { tail -40 /tmp/conf.log; exit 1; }
          make > /tmp/make.log 2>&1 || { tail -40 /tmp/make.log; exit 1; }
          echo "SERVER_BIN=$PWD/objs/nginx" >> "$GITHUB_ENV"

      - name: Provision two domains, then force a renewal reissue
        run: |
          # Two server_names => both must get a cert (multi-name scheduler).
          # autocert_renew_before is set huge so every cert is inside its renew
          # window; a reload spawns a fresh helper whose scan reissues both, and
          # the test asserts the leaf serials changed (real reissue, atomic
          # store swap that the M7 serve path hot-reloads).
          sudo env SERVER_BIN="$SERVER_BIN" \
            NGX_BUILD_DIR="$(dirname "$SERVER_BIN")/.." \
            bash "$GITHUB_WORKSPACE/tests/renewal.sh"

  backoff:
    name: Per-name failure backoff (M9b)
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre2-dev zlib1g-dev libssl-dev

      - name: Fetch + build nginx with the module
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          curl -fsSL -o src.tar.gz "https://nginx.org/download/nginx-$ver.tar.gz"
          tar -xzf src.tar.gz
          cd "nginx-$ver"
          ./configure --with-compat --with-http_ssl_module \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /tmp/conf.log 2>&1 \
            || { tail -40 /tmp/conf.log; exit 1; }
          make > /tmp/make.log 2>&1 || { tail -40 /tmp/make.log; exit 1; }
          echo "SERVER_BIN=$PWD/objs/nginx" >> "$GITHUB_ENV"

      - name: A failing name must back off, a good name issues once
        run: |
          # One helper, two names: a good one (issues once) and a bad one whose
          # http-01 the Pebble VA can never reach (DNS -> unroutable). The bad
          # name must be retried with the exponential backoff hold (>=~60s),
          # not re-ordered every sweep.
          sudo env SERVER_BIN="$SERVER_BIN" \
            NGX_BUILD_DIR="$(dirname "$SERVER_BIN")/.." \
            bash "$GITHUB_WORKSPACE/tests/backoff.sh"
