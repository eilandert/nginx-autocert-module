          script: cert-validate-reject.sh
          sudo: "true"
          cert_case: ${{ matrix.cert_case }}

  ipv6-directory:
    name: IPv6-literal ACME directory [${{ matrix.flavor }}]
    needs: [resolve, build-nginx, build-angie]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: nginx
            dir: ${{ needs.resolve.outputs.nginx_dir }}
          - flavor: angie
            dir: ${{ needs.resolve.outputs.angie_dir }}
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: IPv6 IP-SAN endpoint sends bracketed Host authority
        uses: ./.github/actions/run-e2e
        with:
          flavor: ${{ matrix.flavor }}
          dir: ${{ matrix.dir }}
          script: ipv6-directory.sh

  ipv4-directory:
    name: IPv4-literal ACME directory [${{ matrix.flavor }}]
    needs: [resolve, build-nginx, build-angie]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: nginx
            dir: ${{ needs.resolve.outputs.nginx_dir }}
          - flavor: angie
            dir: ${{ needs.resolve.outputs.angie_dir }}
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: IPv4 IP-SAN endpoint sends no SNI
        uses: ./.github/actions/run-e2e
        with:
          flavor: ${{ matrix.flavor }}
          dir: ${{ matrix.dir }}
          script: ipv4-directory.sh

  config-rejects:
    name: config-time rejection of invalid directive values [${{ matrix.flavor }}]
    needs: [resolve, build-nginx, build-angie]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: nginx
            dir: ${{ needs.resolve.outputs.nginx_dir }}
          - flavor: angie
            dir: ${{ needs.resolve.outputs.angie_dir }}
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: autocert_dns_hook_timeout 0 (and negative) rejected at config time
        uses: ./.github/actions/run-e2e
        with:
          flavor: ${{ matrix.flavor }}
          dir: ${{ matrix.dir }}
          script: config-rejects.sh
          sudo: "false"

  slowloris-read:
    name: Slow-drip total-read budget (#37) [${{ matrix.flavor }}]
    needs: [resolve]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: nginx
            version: ${{ needs.resolve.outputs.nginx_version }}
            url: ${{ needs.resolve.outputs.nginx_url }}
            dir: ${{ needs.resolve.outputs.nginx_dir }}
          - flavor: angie
            version: ${{ needs.resolve.outputs.angie_version }}
            url: ${{ needs.resolve.outputs.angie_url }}
            dir: ${{ needs.resolve.outputs.angie_dir }}
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup build deps
        uses: ./.github/actions/setup
        with:
          ccache-key: build-slowloris-${{ matrix.flavor }}-${{ matrix.version }}
      - name: Restore source tarball cache
        id: tarball-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/src-tarballs
          key: src-tarball-${{ matrix.flavor }}-${{ matrix.version }}
      - name: Fetch ${{ matrix.flavor }} ${{ matrix.version }}
        if: steps.tarball-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/src-tarballs
          curl -fsSL -o ~/.cache/src-tarballs/${{ matrix.flavor }}-${{ matrix.version }}.tar.gz \
            "${{ matrix.url }}"
      - name: Build ${{ matrix.flavor }} module with a tiny (2s) total-read budget
        run: |
          set -euo pipefail
          tar -xzf ~/.cache/src-tarballs/${{ matrix.flavor }}-${{ matrix.version }}.tar.gz
          cd "${{ matrix.dir }}"
          # -DNGX_AUTOCERT_READ_TOTAL=2000 shrinks the 60s budget to 2s so the
          # slow-drip abort is observable in a few seconds, not a minute.
          ./configure --with-compat --with-http_ssl_module \
            --with-cc="ccache cc" \
            --with-cc-opt="-Wall -Wextra -Werror -DNGX_AUTOCERT_READ_TOTAL=2000" \
            --add-dynamic-module="$GITHUB_WORKSPACE" > /tmp/conf.log 2>&1 \
            || { tail -40 /tmp/conf.log; exit 1; }
          make > /tmp/make.log 2>&1 || { tail -40 /tmp/make.log; exit 1; }
          test -f objs/ngx_http_autocert_module.so
          BIN=objs/${{ matrix.flavor }}; [ -x "$BIN" ] || BIN=objs/nginx
          test -x "$BIN"
      - name: A byte-dripping CA must be cut off by the total-read budget
        run: |
          set -euo pipefail
          NGX="$GITHUB_WORKSPACE/${{ matrix.dir }}"
          BIN="$NGX/objs/${{ matrix.flavor }}"; [ -x "$BIN" ] || BIN="$NGX/objs/nginx"
          SERVER_BIN="$BIN" NGX_BUILD_DIR="$NGX" \
            bash "$GITHUB_WORKSPACE/tests/e2e/slowloris-read.sh"
