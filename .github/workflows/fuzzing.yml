name: Fuzzing

# Coverage-guided fuzzing of the ACME JSON parser and the HTTP-response parser.
# Monthly discovery run plus manual dispatch; kept off PR feedback because the
# normal unit tests run on every push/PR.
#
# Action pins:
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/cache@v4           -> 0057852bfaa89a56745cba8c7296529d2fc39830
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Monthly, 1st @ 03:41 UTC.
    - cron: "41 3 1 * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Fuzz duration in seconds"
        required: false
        default: "900"

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Parser fuzz (JSON + HTTP)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install clang + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache clang curl libpcre2-dev libssl-dev zlib1g-dev

      - name: Resolve latest mainline nginx
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          if [ -z "$ver" ]; then
            echo "::error::could not resolve mainline nginx version"
            exit 1
          fi
          echo "NGINX_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Restore nginx tarball cache
        id: nginx-tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/src-tarballs
          key: src-tarball-nginx-${{ env.NGINX_VERSION }}

      - name: Fetch nginx source
        if: steps.nginx-tarball.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/src-tarballs
          curl -fsSL \
            -o "$HOME/.cache/src-tarballs/nginx-${NGINX_VERSION}.tar.gz" \
            "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"

      # ccache the from-scratch nginx compile (this workflow builds its own tree,
      # so it doesn't benefit from build-test.yml's build cache).
      - name: Restore ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.ccache
          key: ccache-fuzz-${{ env.NGINX_VERSION }}-${{ github.sha }}
          restore-keys: |
            ccache-fuzz-${{ env.NGINX_VERSION }}-
            ccache-fuzz-

      - name: Build nginx objects used by the parser harness
        run: |
          set -euo pipefail
          # Match the dir the ccache restore step saves/restores (~/.ccache);
          # ccache 4 would otherwise default to ~/.cache/ccache and never warm.
          export CCACHE_DIR="$HOME/.ccache"
          ccache --max-size=500M
          mkdir -p .build
          tar -xzf "$HOME/.cache/src-tarballs/nginx-${NGINX_VERSION}.tar.gz" -C .build
          cd ".build/nginx-${NGINX_VERSION}"
          ./configure --with-http_ssl_module --with-cc="ccache cc"
          make -j"$(nproc)"
          ccache -s || true

      - name: Build fuzz targets
        run: |
          NGX_BUILD_DIR="$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}" \
            bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz"

      - name: Select fuzz duration
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FUZZ_SECS=${{ github.event.inputs.duration }}" >> "$GITHUB_ENV"
          else
            echo "FUZZ_SECS=900" >> "$GITHUB_ENV"
          fi

      # Restore corpus from prior scheduled run so the fuzzer extends existing
      # coverage rather than starting from scratch each month.
      - name: Restore fuzz corpus cache
        id: corpus-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            fuzz/corpus
            fuzz/corpus_http
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-

      - name: Run fuzzers
        run: |
          set -euo pipefail
          cd fuzz
          # Split the budget across the two targets so a dispatch duration is
          # honoured overall (each gets half, min 30s).
          half=$(( FUZZ_SECS / 2 ))
          [ "$half" -lt 30 ] && half=30
          mkdir -p corpus_http
          ./fuzz_json \
            -max_total_time="$half" \
            -print_final_stats=1 \
            -artifact_prefix="crash-json-" \
            corpus/
          ./fuzz_http \
            -max_total_time="$half" \
            -print_final_stats=1 \
            -artifact_prefix="crash-http-" \
            corpus_http/

      # Merge-minimize each corpus so the cache stays compact and the next run
      # seeds from the distilled set.
      - name: Minimize and persist corpus growth
        if: success() && github.event_name == 'schedule'
        run: |
          set -euo pipefail
          cd fuzz
          for t in json http; do
            src="corpus"; [ "$t" = http ] && src="corpus_http"
            mkdir -p "${src}-min"
            "./fuzz_${t}" -merge=1 "${src}-min/" "${src}/"
            echo "Merged ${t} corpus: $(find "${src}-min" -type f | wc -l) units"
            rm -rf "${src}"
            mv "${src}-min" "${src}"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-crashes
          path: ${{ github.workspace }}/fuzz/crash-*
          retention-days: 30

      - name: Upload minimized corpus artifact
        if: success() && github.event_name == 'schedule'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-corpus
          path: |
            ${{ github.workspace }}/fuzz/corpus
            ${{ github.workspace }}/fuzz/corpus_http
          retention-days: 30
