name: Build module + load/serve tests
description: >
  Fetch one flavor (nginx | angie), configure + build the autocert dynamic
  modules against it, run the no-network load / negative / serve tests, and
  upload the built tree as the build-<flavor> artifact. Factored out of the
  workflow so the per-flavor build jobs share one definition and downstream
  jobs can depend on a single flavor's build (not the whole matrix).

inputs:
  flavor:
    description: nginx | angie
    required: true
  version:
    description: Resolved upstream version.
    required: true
  url:
    description: Source tarball URL.
    required: true
  dir:
    description: Unpacked source dir name (e.g. nginx-1.31.2).
    required: true

runs:
  using: composite
  steps:
    - name: Setup build deps
      uses: ./.github/actions/setup
      with:
        ccache-key: build-${{ inputs.flavor }}-${{ inputs.version }}

    - name: Restore source tarball cache
      id: tarball-cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/src-tarballs
        key: src-tarball-${{ inputs.flavor }}-${{ inputs.version }}

    - name: Fetch ${{ inputs.flavor }} ${{ inputs.version }}
      if: steps.tarball-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p ~/.cache/src-tarballs
        curl -fsSL -o ~/.cache/src-tarballs/${{ inputs.flavor }}-${{ inputs.version }}.tar.gz \
          "${{ inputs.url }}"

    - name: Extract ${{ inputs.flavor }} ${{ inputs.version }}
      shell: bash
      run: |
        set -euo pipefail
        tar -xzf ~/.cache/src-tarballs/${{ inputs.flavor }}-${{ inputs.version }}.tar.gz

    - name: Configure + build module
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ inputs.dir }}"
        # AUTOCERT_TEST=1 compiles in the test-only seed directives
        # (autocert_test_challenge / autocert_test_alpn) the e2e suite needs.
        # Production builds omit them; the "test-directives rejected" job proves
        # a no-flag build rejects them.
        AUTOCERT_TEST=1 ./configure --with-compat --with-http_ssl_module \
          --with-cc="ccache cc" \
          --with-cc-opt="-Wall -Wextra -Werror" \
          --add-dynamic-module="$GITHUB_WORKSPACE" > /tmp/conf.log 2>&1 \
          || { tail -40 /tmp/conf.log; exit 1; }
        # Full build (not `make modules`): the load test needs the server
        # binary too. angie names it objs/angie, nginx names it objs/nginx.
        make > /tmp/make.log 2>&1 || { tail -40 /tmp/make.log; exit 1; }
        test -f objs/ngx_http_autocert_module.so
        BIN=objs/nginx; [ -x objs/angie ] && BIN=objs/angie
        test -x "$BIN"
        echo "SERVER_BIN=$PWD/$BIN" >> "$GITHUB_ENV"
        echo "✓ built autocert .so (http) + $BIN"
        # Hit-rate visibility (CACHE-4): confirm ccache is actually warming.
        ccache -s || true

    - name: Load smoke test (parse + name collection)
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ inputs.dir }}"
        BIN="$SERVER_BIN"
        MOD="$PWD/objs/ngx_http_autocert_module.so"
        PREFIX=/tmp/ngx-test
        mkdir -p "$PREFIX/logs" "$PREFIX/conf"
        cat > "$PREFIX/conf/nginx.conf" <<EOF
        load_module $MOD;
        error_log $PREFIX/logs/error.log notice;   # NOTICE level: the worker-0 driver-armed line is NOTICE
        events {}
        http {
            autocert on admin@example.com;   # global
            # M2 global tuning knobs (all non-default values).
            autocert_ca https://acme-staging-v02.api.letsencrypt.org/directory;
            autocert_renew_before 10d;
            autocert_key_type secp256r1;
            autocert_store secure;
            autocert_path $PREFIX/store;   # writable by the unprivileged runner; the worker-0 driver creates + locks it
            autocert_challenge tls-alpn-01;
            server {
                listen 8080;
                server_name a.example.com www.a.example.com;
                autocert on;                  # per-vhost override, 2 names
            }
            server {
                listen 8081;
                server_name b.example.com;
                autocert off;                 # opt out, name NOT collected
            }
            server {
                listen 8082;
                # regex + leading/suffix wildcard names are skipped (not issuable).
                server_name ~^re\.example\.com$ *.wild.example.com www.suffix.*;
                autocert on;
            }
        }
        EOF
        # 1) -t: config parses, module loads, postconfig walk runs clean.
        "$BIN" -t -p "$PREFIX" -c "$PREFIX/conf/nginx.conf"
        # 2) The postconfig name-count NOTICE is only emitted on a real start
        #    (nginx gates notice-level output under -t), so briefly start,
        #    grep the error log, then stop. High ports → no root needed.
        "$BIN" -p "$PREFIX" -c "$PREFIX/conf/nginx.conf"
        for i in $(seq 1 20); do [ -s "$PREFIX/logs/error.log" ] && break; sleep 0.2; done
        "$BIN" -p "$PREFIX" -c "$PREFIX/conf/nginx.conf" -s stop || true
        cat "$PREFIX/logs/error.log"
        # Exactly the 2 concrete names of the enabled vhost must be collected:
        # b.* is off; regex + wildcard are skipped; dedup across vhosts.
        grep -q 'autocert: 2 name(s) enabled for issuance' "$PREFIX/logs/error.log"
        grep -q 'autocert: ACME driver armed on worker 0' "$PREFIX/logs/error.log"
        echo "✓ ${{ inputs.flavor }} ${{ inputs.version }} parsed autocert_* + collected enabled names"

    - name: Reject invalid config (negative tests)
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ inputs.dir }}"
        BIN="$SERVER_BIN"
        MOD="$PWD/objs/ngx_http_autocert_module.so"
        PREFIX=/tmp/ngx-bad
        mkdir -p "$PREFIX/logs" "$PREFIX/conf"

        # Each case: a description, the http{} body, and the substring the
        # rejection message must contain. Every one must fail `nginx -t`.
        run_neg() {
          local desc="$1" body="$2" want="$3"
          printf 'load_module %s;\nevents {}\nhttp {\n%s\n}\n' \
            "$MOD" "$body" > "$PREFIX/conf/nginx.conf"
          if "$BIN" -t -p "$PREFIX" -c "$PREFIX/conf/nginx.conf" 2>/tmp/err; then
            echo "::error::[$desc] invalid config was accepted"; cat /tmp/err
            exit 1
          fi
          if ! grep -q "$want" /tmp/err; then
            echo "::error::[$desc] wrong error message (wanted: $want)"
            cat /tmp/err; exit 1
          fi
          echo "✓ rejected: $desc"
        }

        run_neg "invalid email"        'server { listen 8080; autocert on x@; }'                          'invalid email'
        run_neg "bad key_type"         'autocert_key_type rsa2048;'                                       'invalid key type'
        run_neg "bad store"            'autocert_store vault;'                                            'invalid store'
        run_neg "bad challenge"        'autocert_challenge dns-01;'                                       'invalid challenge'
        run_neg "duplicate key"        'autocert_key_type secp384r1; autocert_key_type secp256r1;'        'is duplicate'
        run_neg "knob in server{}"     'server { listen 8080; autocert_ca http://x/; }'                   'directive is not allowed'
        run_neg "staging+ca conflict"  'autocert_staging on; autocert_ca https://example.com/dir;'        'mutually exclusive'
        echo "✓ all negative cases rejected"

        # Positive: autocert_staging on must be accepted (no network, just -t).
        run_pos() {
          local desc="$1" body="$2"
          printf 'load_module %s;\nevents {}\nhttp {\n%s\n}\n' \
            "$MOD" "$body" > "$PREFIX/conf/nginx.conf"
          if ! "$BIN" -t -p "$PREFIX" -c "$PREFIX/conf/nginx.conf" 2>/tmp/err; then
            echo "::error::[$desc] valid config was rejected"; cat /tmp/err
            exit 1
          fi
          echo "✓ accepted: $desc"
        }

        run_pos "autocert_staging on"  'autocert_staging on; autocert_path /tmp/ac-stage;'
        run_pos "store certbot"        'autocert_store certbot; autocert_path /tmp/ac-cb;'
        echo "✓ all positive cases accepted"

    - name: Worker-0 ACME driver lifecycle (P1)
      shell: bash
      run: |
        set -euo pipefail
        # The ACME engine runs on worker 0 behind an flock singleton lock.
        # Assert: driver arms on worker 0 at start; a reload hands the lock off
        # to a fresh worker 0 (<=1 live driver); a SIGKILL of worker 0 is
        # respawned + re-armed by the master; clean stop. Replaces the removed
        # helper-lifecycle.sh / helper-usr2.sh. No network/docker, high port.
        NGX_BUILD_DIR="$GITHUB_WORKSPACE/${{ inputs.dir }}" \
          AC_TEST_PORT=18185 \
          bash "$GITHUB_WORKSPACE/tests/worker0-driver.sh"

    - name: HTTP-01 challenge serve (M5)
      shell: bash
      run: |
        set -euo pipefail
        # Seed a token via autocert_test_challenge, fetch
        # /.well-known/acme-challenge/<token>, assert exact keyauth + 404s.
        SERVER_BIN="$SERVER_BIN" \
          NGX_BUILD_DIR="$GITHUB_WORKSPACE/${{ inputs.dir }}" \
          AC_TEST_PORT=18178 \
          bash "$GITHUB_WORKSPACE/tests/http01-challenge.sh"

    - name: Per-SNI certificate serving (M7)
      shell: bash
      run: |
        set -euo pipefail
        # `listen ssl; autocert on;` with no ssl_certificate must start,
        # serve a bootstrap cert pre-issuance, serve the real store cert by
        # SNI, and hot-reload on mtime change. No network/docker.
        SERVER_BIN="$SERVER_BIN" \
          NGX_BUILD_DIR="$GITHUB_WORKSPACE/${{ inputs.dir }}" \
          AC_TEST_PORT=18179 \
          bash "$GITHUB_WORKSPACE/tests/tls-serve.sh"

    - name: tls-alpn-01 ALPN serve path (M10b)
      shell: bash
      run: |
        set -euo pipefail
        # A client negotiating ALPN "acme-tls/1" + SNI gets the seeded
        # challenge cert (SAN + critical acmeIdentifier); a normal client gets
        # the ordinary cert and negotiates http/1.1. No network/docker.
        SERVER_BIN="$SERVER_BIN" \
          NGX_BUILD_DIR="$GITHUB_WORKSPACE/${{ inputs.dir }}" \
          AC_TEST_PORT=18180 \
          bash "$GITHUB_WORKSPACE/tests/tls-alpn-challenge.sh"

    # Publish the built tree (objs + src headers) so unit/integration jobs
    # link/run against it instead of recompiling.
    - name: Upload built tree
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: build-${{ inputs.flavor }}
        path: |
          ${{ inputs.dir }}/objs
          ${{ inputs.dir }}/src
        retention-days: 1
        if-no-files-found: error
