name: Run a Pebble e2e test
description: >
  Shared setup for the Pebble end-to-end jobs: checkout is done by the caller,
  this restores the build-<flavor> artifact, makes the server binary executable,
  and runs one tests/*.sh script with SERVER_BIN + NGX_BUILD_DIR set. Factored
  out of build-test.yml so the e2e jobs share one definition instead of
  repeating the same download/chmod/run boilerplate (FLOW-4). Flavor-aware so
  the same jobs run against both nginx and angie.

inputs:
  flavor:
    description: nginx | angie. Selects the build-<flavor> artifact + objs/<flavor> binary.
    default: nginx
  dir:
    description: Unpacked source dir name (e.g. nginx-1.31.2 / angie-1.11.8).
    required: true
  script:
    description: Test script under tests/ to run (e.g. order-authz.sh).
    required: true
  sudo:
    description: Run the script under sudo (needed when it binds :80). "true"/"false".
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup runtime deps
      uses: ./.github/actions/setup
      with:
        packages: libpcre2-8-0

    # Several mock-CA e2e scripts sign the issued leaf over the order's CSR
    # public key (the driver validates leaf<->key before storing), which needs
    # python3 "cryptography". Install it for the system python3 the mocks run
    # under (also when invoked via sudo). Harmless for scripts that don't use it.
    - name: Install python cryptography for the mock CAs
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y python3-cryptography

    - name: Download ${{ inputs.flavor }} build
      uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
      with:
        name: build-${{ inputs.flavor }}
        path: ${{ inputs.dir }}

    - name: Run ${{ inputs.script }} against ${{ inputs.flavor }}
      shell: bash
      run: |
        set -euo pipefail
        NGX="$GITHUB_WORKSPACE/${{ inputs.dir }}"
        # nginx ships objs/nginx; angie ships objs/angie. The test scripts pick
        # the right binary from NGX_BUILD_DIR too, but run-e2e needs the path to
        # chmod + to pass SERVER_BIN explicitly.
        # Artifacts don't preserve the exec bit, so test EXISTENCE (-f) not -x,
        # then chmod. (-x would always miss and wrongly fall back to objs/nginx,
        # which the angie artifact doesn't contain.)
        BIN="$NGX/objs/${{ inputs.flavor }}"
        [ -f "$BIN" ] || BIN="$NGX/objs/nginx"
        chmod +x "$BIN"
        script="$GITHUB_WORKSPACE/tests/${{ inputs.script }}"
        if [ "${{ inputs.sudo }}" = "true" ]; then
          sudo env SERVER_BIN="$BIN" NGX_BUILD_DIR="$NGX" bash "$script"
        else
          SERVER_BIN="$BIN" NGX_BUILD_DIR="$NGX" bash "$script"
        fi
